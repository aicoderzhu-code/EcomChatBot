services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:14-alpine
    container_name: ecom-chatbot-postgres
    environment:
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: ecom_password
      POSTGRES_DB: ecom_chatbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecom_user -d ecom_chatbot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecom-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: ecom-chatbot-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ecom-network

  # Milvus Standalone
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: ecom-chatbot-milvus-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ecom-network

  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: ecom-chatbot-milvus-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ecom-network

  milvus:
    image: milvusdb/milvus:v2.3.3
    container_name: ecom-chatbot-milvus
    command: milvus run standalone
    depends_on:
      - milvus-etcd
      - milvus-minio
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    networks:
      - ecom-network

  # 数据库初始化服务（只运行一次）
  db-init:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecom-chatbot-db-init
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://ecom_user:ecom_password@postgres:5432/ecom_chatbot
      REDIS_URL: redis://redis:6379/0
      POSTGRES_HOST: postgres
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: ecom_password
      POSTGRES_DB: ecom_chatbot
      RUN_INIT_DB: "true"
      RUN_MIGRATIONS: "false"
      # JWT配置
      JWT_SECRET: "ecom-chatbot-secret-key-change-in-production-2024"
      JWT_ALGORITHM: "HS256"
      # API Key配置
      API_KEY_PREFIX: "eck_"
      API_KEY_LENGTH: "32"
      # 基础配置
      APP_NAME: "电商智能客服系统"
      DEBUG: "true"
      ENVIRONMENT: "development"
    command: python init_db.py
    networks:
      - ecom-network
    restart: "no"

  # FastAPI 应用
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecom-chatbot-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+asyncpg://ecom_user:ecom_password@postgres:5432/ecom_chatbot
      REDIS_URL: redis://redis:6379/0
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      POSTGRES_HOST: postgres
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: ecom_password
      POSTGRES_DB: ecom_chatbot
      RUN_INIT_DB: "false"
      RUN_MIGRATIONS: "false"
      # JWT配置
      JWT_SECRET: "ecom-chatbot-secret-key-change-in-production-2024"
      JWT_ALGORITHM: "HS256"
      JWT_ACCESS_TOKEN_EXPIRE_HOURS: "8"
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: "30"
      # API Key配置
      API_KEY_PREFIX: "eck_"
      API_KEY_LENGTH: "32"
      # 基础配置
      APP_NAME: "电商智能客服系统"
      APP_VERSION: "1.0.0"
      DEBUG: "true"  # 启用调试模式以显示文档
      ENVIRONMENT: "development"
      API_V1_PREFIX: "/api/v1"
      # LLM配置 - 使用DeepSeek作为默认提供商
      LLM_PROVIDER: "deepseek"
      # DeepSeek配置
      DEEPSEEK_API_KEY: "your-deepseek-api-key-here"
      DEEPSEEK_MODEL: "deepseek-chat"
      DEEPSEEK_BASE_URL: "https://api.deepseek.com"
      # OpenAI兼容配置（DeepSeek使用OpenAI兼容接口）
      OPENAI_API_KEY: "your-deepseek-api-key-here"
      OPENAI_API_BASE: "https://api.deepseek.com"
      OPENAI_MODEL: "deepseek-chat"
      DEFAULT_LLM_MODEL: "deepseek-chat"
      # Embedding 维度（text-embedding-v4 输出 1024 维）
      EMBEDDING_DIMENSION: "1024"
      # 日志配置
      LOG_LEVEL: "INFO"
      LOG_FORMAT: "json"
    ports:
      - "8000:8000"
    # volumes:  # 生产环境不挂载，代码打包在镜像中
    #   - ./backend:/app
    networks:
      - ecom-network
    restart: unless-stopped

  # 前端应用
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # 构建时使用的 API URL（客户端通过 nginx 访问）
        - NEXT_PUBLIC_API_BASE_URL=/api/v1
        - NEXT_PUBLIC_WS_BASE_URL=ws://localhost/api/v1/ws
    container_name: ecom-chatbot-frontend
    depends_on:
      - api
    ports:
      - "3000:3000"
    networks:
      - ecom-network
    restart: unless-stopped

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: ecom-chatbot-nginx
    command: /bin/sh -c "rm -f /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    depends_on:
      - frontend
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - ecom-network
    restart: unless-stopped

  # Celery Worker
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecom-chatbot-celery-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+asyncpg://ecom_user:ecom_password@postgres:5432/ecom_chatbot
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      POSTGRES_HOST: postgres
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: ecom_password
      POSTGRES_DB: ecom_chatbot
      RUN_INIT_DB: "false"
      RUN_MIGRATIONS: "false"
      # JWT配置
      JWT_SECRET: "ecom-chatbot-secret-key-change-in-production-2024"
      JWT_ALGORITHM: "HS256"
      # 基础配置
      APP_NAME: "电商智能客服系统"
      DEBUG: "true"
      ENVIRONMENT: "development"
      LOG_LEVEL: "INFO"
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=2
    networks:
      - ecom-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:

networks:
  ecom-network:
    driver: bridge
