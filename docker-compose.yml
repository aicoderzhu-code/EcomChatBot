services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:14-alpine
    container_name: ecom-chatbot-postgres
    environment:
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: ecom_password
      POSTGRES_DB: ecom_chatbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecom_user -d ecom_chatbot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecom-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: ecom-chatbot-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ecom-network


  # 数据库初始化服务（只运行一次）
  db-init:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecom-chatbot-db-init
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.local              # 共享配置（TOS等）
      - backend/.env            # 后端主配置
    environment:
      # Docker 特定配置（覆盖 .env 中的值）
      DATABASE_URL: postgresql+asyncpg://ecom_user:ecom_password@postgres:5432/ecom_chatbot
      REDIS_URL: redis://redis:6379/0
      POSTGRES_HOST: postgres
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: ecom_password
      POSTGRES_DB: ecom_chatbot
      RUN_INIT_DB: "true"
      RUN_MIGRATIONS: "false"
    command: python init_db.py
    networks:
      - ecom-network
    restart: "no"

  # FastAPI 应用
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecom-chatbot-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    env_file:
      - .env.local              # 共享配置（TOS等）
      - backend/.env            # 后端主配置
    environment:
      # Docker 特定配置（覆盖 .env 中的值）
      DATABASE_URL: postgresql+asyncpg://ecom_user:ecom_password@postgres:5432/ecom_chatbot
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      POSTGRES_HOST: postgres
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: ecom_password
      POSTGRES_DB: ecom_chatbot
      RUN_INIT_DB: "false"
      RUN_MIGRATIONS: "false"
    ports:
      - "8000:8000"
    # volumes:  # 生产环境不挂载，代码打包在镜像中
    #   - ./backend:/app
    networks:
      - ecom-network
    restart: unless-stopped

  # 前端应用（直接对外暴露 80 端口，通过 Next.js rewrites 代理 API 请求）
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=/api/v1
        - NEXT_PUBLIC_WS_BASE_URL=
    container_name: ecom-chatbot-frontend
    depends_on:
      - api
    ports:
      - "80:3000"
    networks:
      - ecom-network
    restart: unless-stopped

  # Celery Worker
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecom-chatbot-celery-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    env_file:
      - .env.local              # 共享配置（TOS等）
      - backend/.env            # 后端主配置
    environment:
      # Docker 特定配置（覆盖 .env 中的值）
      DATABASE_URL: postgresql+asyncpg://ecom_user:ecom_password@postgres:5432/ecom_chatbot
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      POSTGRES_HOST: postgres
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: ecom_password
      POSTGRES_DB: ecom_chatbot
      RUN_INIT_DB: "false"
      RUN_MIGRATIONS: "false"
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=2 -Q default,notifications,data_processing,billing,webhooks
    networks:
      - ecom-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  ecom-network:
    driver: bridge
