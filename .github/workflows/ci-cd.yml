# GitHub Actions CI/CD 配置
# 代码仓库：https://gitee.com/fridge1/ecom-chat-bot
# 同步镜像到 GitHub 后可使用此配置

name: CI/CD Pipeline

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==================== 测试 ====================
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v --cov=. --cov-report=xml || true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
        continue-on-error: true

  # ==================== 代码检查 ====================
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linters
        run: pip install flake8 black isort

      - name: Run linters
        run: |
          cd backend
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
          black --check . || true
          isort --check-only . || true
        continue-on-error: true

  # ==================== 构建 Docker 镜像 ====================
  build:
    needs: [test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== 部署到测试环境 ====================
  deploy-staging:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "=========================================="
            echo "  电商智能客服系统 - 自动部署 (测试环境)"
            echo "=========================================="

            cd /opt/ecom-chatbot

            echo ">>> 拉取最新代码..."
            git fetch origin develop
            git checkout develop
            git pull origin develop

            echo ">>> 拉取最新镜像..."
            docker compose pull

            echo ">>> 重启服务..."
            docker compose up -d --remove-orphans

            echo ">>> 清理旧镜像..."
            docker image prune -f

            echo ">>> 等待服务启动..."
            sleep 30

            echo ">>> 健康检查..."
            curl -f http://localhost:8000/health || exit 1

            echo ">>> 部署完成！"
            docker compose ps

  # ==================== 部署到生产环境 ====================
  deploy-production:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    environment: production

    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "=========================================="
            echo "  电商智能客服系统 - 自动部署 (生产环境)"
            echo "=========================================="

            cd /opt/ecom-chatbot

            echo ">>> 备份数据库..."
            docker compose exec -T postgres pg_dump -U ecom_user ecom_chatbot > /backup/db_$(date +%Y%m%d_%H%M%S).sql || true

            echo ">>> 拉取最新代码..."
            git fetch origin master
            git checkout master
            git pull origin master

            echo ">>> 拉取最新镜像..."
            docker compose pull

            echo ">>> 滚动更新..."
            docker compose up -d --remove-orphans

            echo ">>> 清理旧镜像..."
            docker image prune -f

            echo ">>> 等待服务启动..."
            sleep 30

            echo ">>> 健康检查..."
            curl -f http://localhost:8000/health || exit 1

            echo ">>> 生产环境部署完成！"
            docker compose ps
