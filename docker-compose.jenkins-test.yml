version: '3.8'

services:
  # 独立测试数据库
  test-postgres:
    image: postgres:14-alpine
    container_name: jenkins-test-postgres
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: test_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - jenkins-test-network

  # 独立测试Redis  
  test-redis:
    image: redis:7-alpine
    container_name: jenkins-test-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - jenkins-test-network

  # 测试API服务
  test-api:
    image: ${TEST_IMAGE:-ecom-chat-bot-api:latest}
    container_name: jenkins-test-api
    depends_on:
      test-postgres:
        condition: service_healthy
      test-redis:
        condition: service_healthy
    environment:
      # 数据库配置
      POSTGRES_HOST: test-postgres
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: test_db
      DATABASE_URL: postgresql+asyncpg://test_user:test_password@test-postgres:5432/test_db
      
      # Redis配置
      REDIS_URL: redis://test-redis:6379/0
      CELERY_BROKER_URL: redis://test-redis:6379/1
      CELERY_RESULT_BACKEND: redis://test-redis:6379/2
      
      # JWT配置（测试用）
      JWT_SECRET: test-secret-key-for-ci-testing-only
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_HOURS: 8
      
      # 测试环境标识
      TESTING: "true"
      ENVIRONMENT: testing
      DEBUG: "false"
      
      # 禁用初始化
      RUN_INIT_DB: "false"
      RUN_MIGRATIONS: "false"
      
      # API配置
      OPENAI_API_KEY: sk-test-key-for-ci
      OPENAI_API_BASE: https://api.deepseek.com
      OPENAI_MODEL: deepseek-chat
      
      # 可选服务（测试时不需要）
      MILVUS_HOST: ""
      RABBITMQ_URL: ""
    volumes:
      - ./backend:/app
    networks:
      - jenkins-test-network
    command: sleep infinity

networks:
  jenkins-test-network:
    driver: bridge
