version: '3.8'

# 生产环境 Docker Compose 配置
# 用于 Jenkins CI/CD 自动部署

services:
  # FastAPI 应用
  api:
    image: ecom-chat-bot-api:${BUILD_NUMBER:-latest}
    container_name: ecom-chatbot-api
    restart: unless-stopped
    environment:
      # 数据库连接（使用外部服务）
      DATABASE_URL: postgresql+asyncpg://ecom_user:ecom_password@localhost:5432/ecom_chatbot
      POSTGRES_HOST: localhost
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: ecom_password
      POSTGRES_DB: ecom_chatbot
      
      # Redis（使用外部服务）
      REDIS_URL: redis://localhost:6379/0
      
      # Milvus（使用外部服务）
      MILVUS_HOST: localhost
      MILVUS_PORT: 19530
      
      # RabbitMQ（使用外部服务）
      RABBITMQ_URL: amqp://guest:guest@localhost:5672/
      
      # Celery
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      
      # 不运行初始化（生产环境已初始化）
      RUN_INIT_DB: "false"
      RUN_MIGRATIONS: "false"
    env_file:
      - /opt/ecom-chat-bot/shared/.env.production
    network_mode: host
    # host 网络模式下不需要 ports 映射，直接使用宿主机端口
    # 移除 depends_on，假设基础服务已在宿主机运行
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - /opt/ecom-chat-bot/shared/logs:/app/logs

  # Celery Worker
  celery-worker:
    image: ecom-chat-bot-api:${BUILD_NUMBER:-latest}
    container_name: ecom-chatbot-celery
    restart: unless-stopped
    command: celery -A tasks.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://ecom_user:ecom_password@localhost:5432/ecom_chatbot
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      POSTGRES_HOST: localhost
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: ecom_password
      POSTGRES_DB: ecom_chatbot
      RUN_INIT_DB: "false"
      RUN_MIGRATIONS: "false"
    env_file:
      - /opt/ecom-chat-bot/shared/.env.production
    network_mode: host
    # 移除 depends_on，假设基础服务已在宿主机运行
    volumes:
      - /opt/ecom-chat-bot/shared/logs:/app/logs

# 移除 networks 配置，使用 host 网络模式
# 注意：
# 1. 基础服务(postgres, redis, milvus, rabbitmq)应在宿主机上运行
# 2. 本配置使用 host 网络模式，直接访问宿主机服务
# 3. BUILD_NUMBER 由 Jenkins 传入，用于版本标记
