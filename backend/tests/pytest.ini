[pytest]
# Pytest配置文件

# 测试目录
testpaths = tests

# Python文件匹配模式
python_files = test_*.py *_test.py

# 测试类匹配模式
python_classes = Test* *Tests

# 测试函数匹配模式
python_functions = test_*

# 异步测试配置
asyncio_mode = auto

# 标记(markers)定义
markers =
    unit: 单元测试
    integration: 集成测试
    e2e: 端到端测试
    slow: 慢速测试(> 1s)
    fast: 快速测试(< 1s)
    smoke: 冒烟测试
    regression: 回归测试
    performance: 性能测试
    health: 健康检查测试
    admin: 管理员模块测试
    tenant: 租户模块测试
    conversation: 对话模块测试
    ai_chat: AI对话模块测试
    knowledge: 知识库模块测试
    payment: 支付模块测试
    rag: RAG模块测试
    webhook: Webhook模块测试
    websocket: WebSocket模块测试
    monitor: 监控模块测试
    quality: 质量评估模块测试
    statistics: 统计模块测试
    analytics: 分析模块测试

# 输出配置
addopts =
    -v
    --strict-markers
    --tb=short
    --maxfail=5
    -p no:warnings
    --cov=api
    --cov=services
    --cov=models
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --html=htmlcov/report.html
    --self-contained-html

# 最小覆盖率要求
[coverage:run]
branch = True
source = 
    api
    services
    models
    core

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

[coverage:html]
directory = htmlcov
