[pytest]
# pytest 配置文件

# 测试目录
testpaths = .

# 测试文件命名模式
python_files = test_*.py

# 测试类命名模式
python_classes = Test*

# 测试函数命名模式
python_functions = test_*

# 标记定义
markers =
    health: 健康检查测试
    tenant: 租户相关测试
    auth: 认证授权测试
    conversation: 对话管理测试
    ai_chat: AI对话测试
    knowledge: 知识库测试
    rag: RAG检索测试
    intent: 意图识别测试
    monitor: 监控统计测试
    quality: 质量评估测试
    model_config: 模型配置测试
    admin: 管理员测试
    integration: 集成测试
    performance: 性能测试
    security: 安全测试
    slow: 慢速测试
    skip: 跳过的测试

# 异步支持
asyncio_mode = auto

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 输出配置
console_output_style = progress
addopts = 
    -v
    --strict-markers
    --tb=short
    --html=reports/html/report.html
    --self-contained-html
    --cov=.
    --cov-report=html:reports/coverage
    --cov-report=term-missing
    # 注意: 并行测试已禁用，因为某些测试有资源竞争
    # 如需并行测试，手动添加: -n auto

# 超时设置（秒）
timeout = 300

# 最小 Python 版本
minversion = 3.11
