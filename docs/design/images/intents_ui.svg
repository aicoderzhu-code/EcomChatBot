<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#f3f4f6" />

  <!-- Sidebar -->
  <rect width="240" height="800" fill="#1f2937" />
  <!-- Logo Area -->
  <rect width="240" height="60" fill="#111827" />
  <text x="20" y="40" font-family="sans-serif" font-size="18" fill="white" font-weight="bold">🛒 Ecom Chatbot</text>
  
  <!-- Menu Items -->
  <text x="20" y="105" font-family="sans-serif" font-size="14" fill="#9ca3af">📊 仪表盘 (Dashboard)</text>
  <text x="20" y="145" font-family="sans-serif" font-size="14" fill="#9ca3af">💬 对话管理 (Chat)</text>
  <rect x="0" y="160" width="240" height="40" fill="#374151" /> <!-- Active item -->
  <text x="20" y="185" font-family="sans-serif" font-size="14" fill="white">🎯 意图管理 (Intents)</text>
  <text x="20" y="225" font-family="sans-serif" font-size="14" fill="#9ca3af">📚 知识库 (Knowledge)</text>
  <text x="20" y="265" font-family="sans-serif" font-size="14" fill="#9ca3af">⚙️ 系统设置 (Settings)</text>

  <!-- User Profile at bottom -->
  <rect x="0" y="740" width="240" height="60" fill="#111827" />
  <circle cx="30" cy="770" r="16" fill="#4b5563" />
  <text x="55" y="775" font-family="sans-serif" font-size="12" fill="white">Admin User</text>

  <!-- Main Content Area -->
  <!-- Header -->
  <rect x="240" y="0" width="960" height="60" fill="white" stroke="#e5e7eb" />
  <text x="260" y="35" font-family="sans-serif" font-size="14" fill="#6b7280">首页 / 意图管理</text>
  <rect x="1050" y="15" width="130" height="30" rx="4" fill="#2563eb" />
  <text x="1115" y="35" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" font-weight="bold">+ 新增意图</text>

  <!-- Stats Row -->
  <g transform="translate(260, 80)">
    <!-- Card 1 -->
    <rect width="280" height="100" rx="8" fill="white" stroke="#e5e7eb" />
    <text x="20" y="30" font-family="sans-serif" font-size="14" fill="#6b7280">已定义意图</text>
    <text x="20" y="70" font-family="sans-serif" font-size="28" fill="#111827" font-weight="bold">15</text>
    
    <!-- Card 2 -->
    <rect x="300" width="280" height="100" rx="8" fill="white" stroke="#e5e7eb" />
    <text x="320" y="30" font-family="sans-serif" font-size="14" fill="#6b7280">训练语料总数</text>
    <text x="320" y="70" font-family="sans-serif" font-size="28" fill="#111827" font-weight="bold">3,450</text>

    <!-- Card 3 -->
    <rect x="600" width="280" height="100" rx="8" fill="white" stroke="#e5e7eb" />
    <text x="620" y="30" font-family="sans-serif" font-size="14" fill="#6b7280">识别准确率 (Avg)</text>
    <text x="620" y="70" font-family="sans-serif" font-size="28" fill="#111827" font-weight="bold">92.5%</text>
  </g>

  <!-- Intent List -->
  <g transform="translate(260, 200)">
    <rect width="880" height="500" rx="8" fill="white" stroke="#e5e7eb" />
    <text x="20" y="30" font-family="sans-serif" font-size="16" fill="#111827" font-weight="bold">意图列表</text>
    
    <!-- Table Header -->
    <rect x="20" y="50" width="840" height="40" fill="#f9fafb" />
    <text x="30" y="75" font-family="sans-serif" font-size="12" fill="#6b7280" font-weight="bold">意图名称</text>
    <text x="200" y="75" font-family="sans-serif" font-size="12" fill="#6b7280" font-weight="bold">标识符 (Key)</text>
    <text x="350" y="75" font-family="sans-serif" font-size="12" fill="#6b7280" font-weight="bold">语料数量</text>
    <text x="450" y="75" font-family="sans-serif" font-size="12" fill="#6b7280" font-weight="bold">动作类型</text>
    <text x="600" y="75" font-family="sans-serif" font-size="12" fill="#6b7280" font-weight="bold">状态</text>
    <text x="700" y="75" font-family="sans-serif" font-size="12" fill="#6b7280" font-weight="bold">操作</text>

    <!-- Row 1 -->
    <text x="30" y="115" font-family="sans-serif" font-size="12" fill="#374151">查询物流</text>
    <text x="200" y="115" font-family="sans-serif" font-size="12" fill="#6b7280">query_logistics</text>
    <text x="350" y="115" font-family="sans-serif" font-size="12" fill="#374151">450</text>
    <rect x="450" y="102" width="80" height="20" rx="10" fill="#f3f4f6" />
    <text x="460" y="116" font-family="sans-serif" font-size="10" fill="#374151">API 调用</text>
    <rect x="600" y="102" width="60" height="20" rx="10" fill="#dcfce7" />
    <text x="610" y="116" font-family="sans-serif" font-size="10" fill="#166534">已启用</text>
    <text x="700" y="115" font-family="sans-serif" font-size="12" fill="#2563eb">编辑</text>
    <text x="740" y="115" font-family="sans-serif" font-size="12" fill="#2563eb">测试</text>
    <line x1="20" y1="130" x2="860" y2="130" stroke="#f3f4f6" />

    <!-- Row 2 -->
    <text x="30" y="155" font-family="sans-serif" font-size="12" fill="#374151">申请退款</text>
    <text x="200" y="155" font-family="sans-serif" font-size="12" fill="#6b7280">request_refund</text>
    <text x="350" y="155" font-family="sans-serif" font-size="12" fill="#374151">320</text>
    <rect x="450" y="142" width="80" height="20" rx="10" fill="#f3f4f6" />
    <text x="460" y="156" font-family="sans-serif" font-size="10" fill="#374151">转人工</text>
    <rect x="600" y="142" width="60" height="20" rx="10" fill="#dcfce7" />
    <text x="610" y="156" font-family="sans-serif" font-size="10" fill="#166534">已启用</text>
    <text x="700" y="155" font-family="sans-serif" font-size="12" fill="#2563eb">编辑</text>
    <text x="740" y="155" font-family="sans-serif" font-size="12" fill="#2563eb">测试</text>
    <line x1="20" y1="170" x2="860" y2="170" stroke="#f3f4f6" />

    <!-- Row 3 -->
    <text x="30" y="195" font-family="sans-serif" font-size="12" fill="#374151">商品推荐</text>
    <text x="200" y="195" font-family="sans-serif" font-size="12" fill="#6b7280">recommend_item</text>
    <text x="350" y="195" font-family="sans-serif" font-size="12" fill="#374151">120</text>
    <rect x="450" y="182" width="80" height="20" rx="10" fill="#f3f4f6" />
    <text x="460" y="196" font-family="sans-serif" font-size="10" fill="#374151">知识库回复</text>
    <rect x="600" y="182" width="60" height="20" rx="10" fill="#e0f2fe" />
    <text x="610" y="196" font-family="sans-serif" font-size="10" fill="#075985">训练中</text>
    <text x="700" y="195" font-family="sans-serif" font-size="12" fill="#9ca3af">等待</text>
  </g>
</svg>
