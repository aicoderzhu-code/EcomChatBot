<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统设置 - 电商智能客服</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="sidebar">
    <div class="logo">🛒 电商智能客服</div>
    <div class="menu">
        <a href="dashboard.html" class="menu-item">📊 仪表盘</a>
        <a href="chat.html" class="menu-item">💬 对话管理</a>
        <a href="knowledge.html" class="menu-item">📚 知识库</a>
        <a href="settings.html" class="menu-item active">⚙️ 系统设置</a>
    </div>
    <div class="user-profile">
        <div style="width: 32px; height: 32px; background: #4b5563; border-radius: 50%;"></div>
        <div>
            <div style="font-size: 0.9rem; font-weight: bold;">Admin User</div>
            <div style="font-size: 0.75rem; color: #9ca3af;">Tenant: TechCorp</div>
        </div>
        <a href="login.html" style="margin-left: auto; color: #9ca3af; text-decoration: none;">⏻</a>
    </div>
</div>

<div class="main">
    <div class="header">
        <div class="breadcrumb">首页 / 系统设置</div>
    </div>
    
    <div class="content">
        <div style="display: flex; gap: 20px;">
            <div style="width: 200px; flex-shrink: 0;">
                <div class="card" style="padding: 0;">
                    <div style="padding: 15px; border-bottom: 1px solid #f3f4f6; font-weight: bold; background: #f9fafb;">设置菜单</div>
                    <div style="padding: 10px;">
                        <div style="padding: 10px; background: #eff6ff; color: #2563eb; border-radius: 4px; cursor: pointer; margin-bottom: 5px;">🤖 模型配置</div>
                        <div style="padding: 10px; cursor: pointer; color: #4b5563; margin-bottom: 5px;">🔑 API 密钥</div>
                        <div style="padding: 10px; cursor: pointer; color: #4b5563; margin-bottom: 5px;">🏢 租户信息</div>
                        <div style="padding: 10px; cursor: pointer; color: #4b5563;">🔔 通知设置</div>
                    </div>
                </div>
            </div>
            
            <div style="flex: 1;">
                <div class="card">
                    <div class="card-title">LLM 模型配置</div>
                    <p style="color: #6b7280; font-size: 0.9rem; margin-bottom: 20px;">配置用于智能回复的底层大语言模型参数。</p>
                    
                    <div class="form-group">
                        <label class="form-label">模型提供商 (Provider)</label>
                        <select class="form-select">
                            <option value="openai">OpenAI (GPT-4/3.5)</option>
                            <option value="anthropic">Anthropic (Claude 3)</option>
                            <option value="zhipu">智谱 AI (GLM-4)</option>
                            <option value="deepseek">DeepSeek</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">API Key</label>
                        <input type="password" class="form-input" value="sk-xxxxxxxxxxxxxxxxxxxxxxxx">
                        <div style="font-size: 0.8rem; color: #6b7280; margin-top: 5px;">密钥将加密存储，不会明文显示。</div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">模型名称</label>
                        <input type="text" class="form-input" value="gpt-4o">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">温度 (Temperature): 0.7</label>
                        <input type="range" min="0" max="1" step="0.1" value="0.7" style="width: 100%;">
                        <div style="display: flex; justify-content: space-between; font-size: 0.8rem; color: #6b7280;">
                            <span>精确 (0.0)</span>
                            <span>创造性 (1.0)</span>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">系统提示词 (System Prompt)</label>
                        <textarea class="form-input" style="height: 150px; font-family: monospace;">你是一个专业的电商客服助手。
请始终保持礼貌、专业。
回答要简洁明了。
如果遇到无法回答的问题，请引导用户转接人工客服。
不要编造事实，严格基于提供的上下文回答。</textarea>
                    </div>
                    
                    <div style="margin-top: 20px;">
                        <button class="btn btn-primary">保存配置</button>
                        <button class="btn" style="margin-left: 10px;">重置默认</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
